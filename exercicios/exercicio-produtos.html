<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>  

    * {
        margin: 0%;
        padding: 0%;
        box-sizing: border-box;
    }

    body {
      background-color: rgb(186, 186, 186);
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      font-weight: bolder;
      font-size: x-large;
      display: flex;
    }
    
    .barracadastro {
        background-color: rgb(143, 182, 182);
        height: 60px;
        width: 100%;
        color: rgb(143, 182, 182);
        flex-direction: row;
        margin: 56660px, 0px, 50px, 0px;
        align-items: center;
        display: flex;
        justify-content: end;
        gap: 16px;
        padding-right: 16px;

    }

    .botaoNovo {
        border: solid, 1px, whitesmoke;
        border-radius: 8px;
        background-color: rgb(80, 182, 90);
        padding: 8px;
        width: 70px;
        cursor: pointer;
    }
    
    input {
        width: 300px;
        height: 40px;
        border-radius: 8px;
        border: solid, 2px, whitesmoke;
    }

    .cards {
        border: solid, 3px, rgb(143, 182, 182);
    }

    </style>
</head>
<body>

    <div class="barracadastro">
        <input type="text" id="novo" placeholder="Digite o nome do produto...">
        <button class="botaoNovo" onclick="botaoNovo()">Novo</button>
    </div>

    <div id="divCards" class="cards">

    </div>





<script>

    let produtos = []

    function botaoNovo() {

       const inputNovo = document.getElementById('novo').value;
       const divProdutos = document.getElementById('divCards')

       produtos.push(inputNovo)

       

        for (let item of produtos) {
            divProdutos.innerHTML += '<p>' + item + '</p>'
        }
    }
    
</script>
    
</body>
</html>
